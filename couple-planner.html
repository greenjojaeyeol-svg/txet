<style>
/* (스타일 시트는 이전과 동일하여 가독성을 위해 중복 생략하거나 그대로 유지합니다) */
*{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#C8506A;--rose-l:#ECA0B3;--blush:#FAEEF2;--sand:#F7F1EC;--ink:#1C1A1A;--muted:#9A9086;--border:rgba(200,80,106,0.15);--r:16px;--shadow:0 4px 24px rgba(200,80,106,0.10);}
body{background:var(--sand);font-family:'Pretendard',sans-serif;color:var(--ink);}
#scr-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.lw{width:100%;max-width:360px;text-align:center}
.lcard{background:#fff;border-radius:24px;padding:28px 24px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:left}
.linp{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;outline:none}
.lbtn{width:100%;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer}
#scr-app{display:none;max-width:700px;margin:0 auto;padding-bottom:80px}
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between}
.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:61px;z-index:59}
.nb{flex:1;padding:10px;font-size:11px;background:none;border:none;cursor:pointer;color:var(--muted)}
.nb.on{color:var(--rose);border-bottom:2px solid var(--rose)}
.pg{display:none;padding:16px}.pg.on{display:block}
.sec{font-size:16px;color:var(--rose);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:5px}
.addbtn{width:100%;padding:12px;background:var(--blush);border:1.5px dashed var(--rose-l);border-radius:12px;color:var(--rose);margin-bottom:15px;cursor:pointer}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;padding:15px}
.mapbtns{display:flex;gap:6px;margin-top:10px}
.mbtn{font-size:11px;padding:6px 12px;border-radius:20px;border:none;cursor:pointer;text-decoration:none;font-weight:600}
.mbtn.kk{background:#FEE500;color:#3A1D1D}
.mbtn.na{background:#1a73e8;color:#fff}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;display:none;z-index:1000}
</style>

<body>

<div id="scr-login">
  <div class="lw">
    <h1 style="color:var(--rose);margin-bottom:10px">우리 둘만의 공간</h1>
    <div class="lcard">
      <input class="linp" type="password" id="pw" placeholder="비밀번호 입력">
      <button class="lbtn" onclick="login()">입장하기</button>
    </div>
  </div>
</div>

<div id="scr-app">
  <div class="hdr"><h2>커플 플래너 ♡</h2><button onclick="logout()">로그아웃</button></div>
  <nav class="nav">
    <button class="nb on" onclick="goPage('courses',this)">코스</button>
    <button class="nb" onclick="goPage('restaurants',this)">맛집</button>
    <button class="nb" onclick="goPage('cafes',this)">카페</button>
    <button class="nb" onclick="goPage('settings',this)">설정</button>
  </nav>

  <div class="pg on" id="pg-courses">
    <button class="addbtn" onclick="openAdd('courses')">+ 코스 추가</button>
    <div id="lst-courses"></div>
  </div>
  <div class="pg" id="pg-restaurants">
    <button class="addbtn" onclick="openAdd('restaurants')">+ 맛집 추가</button>
    <div id="lst-restaurants"></div>
  </div>
  <div class="pg" id="pg-cafes">
    <button class="addbtn" onclick="openAdd('cafes')">+ 카페 추가</button>
    <div id="lst-cafes"></div>
  </div>
  <div class="pg" id="pg-settings">
      <div class="sec">설정</div>
      <p>비밀번호 기반으로 자동 동기화됩니다.</p>
  </div>
</div>

<div id="toast"></div>

<script>
// --- 핵심: U+카카오내비 호환 로직 ---
function openNavi(address) {
  if (!address) { alert('주소가 없습니다.'); return; }
  
  const toast = document.getElementById('toast');
  toast.innerText = "카카오내비 연결 중...";
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 2000);

  // 귀하의 Vercel 프록시 서버 주소
  const proxyUrl = 'https://kakao-proxy-fi653dowu-greenjojaeyeol-4549s-projects.vercel.app/v2/local/search/address.json?query=';

  fetch(proxyUrl + encodeURIComponent(address))
    .then(r => r.json())
    .then(data => {
      const doc = data.documents && data.documents[0];
      const name = encodeURIComponent(address);

      if (doc) {
        const lat = doc.y; // 위도
        const lng = doc.x; // 경도

        // [U+카카오내비 공통] 좌표 기반 목적지 자동 설정 딥링크
        // ep(목적지): 경도,위도,이름 순서
        const deepLink = `kakaonavi://route?ep=${lng},${lat},${name}&by=CAR`;
        
        // 실행
        window.location.href = deepLink;

        // 앱이 없을 경우 카카오내비 공식 웹 실행 페이지로 유도 (설치 유도 포함)
        setTimeout(() => {
          window.open(`https://kakaonavi.kakao.com/launch/index.do?ep=${lng},${lat},${name}&by=CAR`, '_blank');
        }, 1500);
      } else {
        // 좌표 검색 실패 시 이름으로 검색 실행
        window.location.href = `kakaonavi://search?q=${name}`;
      }
    })
    .catch(err => {
      console.error(err);
      window.open('https://map.kakao.com/link/search/' + encodeURIComponent(address), '_blank');
    });
}

// --- 나머지 기본 기능 (간략화) ---
var RK = localStorage.getItem('RK');
function login() {
    const pw = document.getElementById('pw').value;
    if(pw) {
        RK = btoa(pw); // 예시용 암호화
        localStorage.setItem('RK', RK);
        location.reload();
    }
}
function logout() { localStorage.removeItem('RK'); location.reload(); }
if(RK) { 
    document.getElementById('scr-login').style.display='none';
    document.getElementById('scr-app').style.display='block';
    // 데이터 불러오기 로직 등이 여기에 들어갑니다.
}
function goPage(p, btn) {
    document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(el => el.classList.remove('on'));
    document.getElementById('pg-'+p).classList.add('on');
    btn.classList.add('on');
}
// 실제 데이터 렌더링 시에는 위에서 만든 openNavi(주소) 함수를 버튼에 연결하세요.
</script>
</body>
