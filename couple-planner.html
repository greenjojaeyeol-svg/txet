<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리 둘만의 공간 ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, update }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
  const firebaseConfig = {
    apiKey:"AIzaSyCItutGKUCET2VyDOuHcA3yemaAIlCcqBo",
    authDomain:"text-85ec2.firebaseapp.com",
    databaseURL:"https://text-85ec2-default-rtdb.firebaseio.com",
    projectId:"text-85ec2",
    storageBucket:"text-85ec2.firebasestorage.app",
    messagingSenderId:"881067394604",
    appId:"1:881067394604:web:5d77e68acb58cc509f3389"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._fb = { db, ref, onValue, set, remove, update };
  window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
  /* 스타일 생략 (기존과 동일) */
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--rose:#C8506A;--sand:#F7F1EC;--border:rgba(200,80,106,0.15);}
  body{background:var(--sand);font-family:'Pretendard',sans-serif;}
  #scr-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .lcard{background:#fff;border-radius:24px;padding:28px;border:1px solid var(--border);width:100%;max-width:360px;}
  .linp{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:12px;outline:none;}
  .lbtn{width:100%;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-weight:600;}
  #scr-app{display:none;max-width:700px;margin:0 auto;}
  .hdr{background:#fff;padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}
  .nav{display:flex;background:#fff;border-bottom:1px solid var(--border);}
  .nb{flex:1;padding:12px;background:none;border:none;color:#999;cursor:pointer;}
  .nb.on{color:var(--rose);border-bottom:2px solid var(--rose);}
  .pg{display:none;padding:16px;}
  .pg.on{display:block;}
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px;}
  .nbtn{display:inline-block;margin-top:10px;padding:8px 16px;background:#FEE500;color:#3A1D1D;border-radius:20px;text-decoration:none;font-size:12px;font-weight:700;border:none;cursor:pointer;}
  #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;display:none;z-index:1000;}
</style>
</head>
<body>

<div id="scr-login">
  <div class="lcard">
    <h2 style="color:var(--rose);margin-bottom:15px;text-align:center;">우리만의 공간 ♡</h2>
    <input class="linp" type="password" id="pw" placeholder="비밀번호 입력">
    <button class="lbtn" onclick="login()">입장하기</button>
  </div>
</div>

<div id="scr-app">
  <div class="hdr"><h2>커플 플래너</h2><button onclick="logout()">로그아웃</button></div>
  <nav class="nav">
    <button class="nb on" onclick="goPage('courses',this)">코스</button>
    <button class="nb" onclick="goPage('restaurants',this)">맛집</button>
    <button class="nb" onclick="goPage('cafes',this)">카페</button>
  </nav>
  <div class="pg on" id="pg-courses"><div id="lst-courses"></div></div>
  <div class="pg" id="pg-restaurants"><div id="lst-restaurants"></div></div>
  <div class="pg" id="pg-cafes"><div id="lst-cafes"></div></div>
</div>

<div id="toast"></div>

<script>
var RK = localStorage.getItem('RK');
function login(){ const pw=$('pw').value; if(pw){ RK=btoa(pw); localStorage.setItem('RK',RK); location.reload(); } }
function logout(){ localStorage.removeItem('RK'); location.reload(); }
function $(i){ return document.getElementById(i); }
function toast(m){ var t=$('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>{t.style.display='none'},2000); }

// ── 핵심: U+카카오내비 앱 강제 실행 및 자동 주소 입력 ─────────────────
function openNavi(address) {
  if (!address) { toast('주소가 없습니다.'); return; }
  toast('U+카카오내비 앱 실행 중...');

  // Vercel 프록시를 통해 주소를 좌표(x, y)로 변환
  const proxyUrl = 'https://kakao-proxy-fi653dowu-greenjojaeyeol-4549s-projects.vercel.app/v2/local/search/address.json?query=';

  fetch(proxyUrl + encodeURIComponent(address))
    .then(r => r.json())
    .then(data => {
      const doc = data.documents && data.documents[0];
      const name = encodeURIComponent(address);

      if (doc) {
        const lat = doc.y; // 위도
        const lng = doc.x; // 경도

        // [안드로이드 전용 인텐트] 
        // package=com.lguplus.navi 를 통해 U+카카오내비 앱을 지목하여 실행합니다.
        // route?ep=... 형식을 통해 목적지 좌표를 앱에 직접 꽂아줍니다.
        const intentUrl = `intent://route?ep=${lng},${lat},${name}&by=CAR#Intent;scheme=kakaonavi;package=com.lguplus.navi;end`;
        
        window.location.href = intentUrl;

        // 앱이 없을 경우를 대비한 런처 페이지 (설치 유도)
        setTimeout(() => {
          window.open(`https://kakaonavi.kakao.com/launch/index.do?ep=${lng},${lat},${name}&by=CAR`, '_blank');
        }, 1500);
      } else {
        // 좌표 변환 실패 시 검색 모드로 실행
        window.location.href = `intent://search?q=${name}#Intent;scheme=kakaonavi;package=com.lguplus.navi;end`;
      }
    })
    .catch(() => {
      // 최종 실패 시 웹 지도라도 띄움
      window.open('https://map.kakao.com/link/search/' + encodeURIComponent(address), '_blank');
    });
}

// ── 데이터 연동 ───────────────────────────────────────────
if(RK){
  $('scr-login').style.display='none';
  $('scr-app').style.display='block';
  window.addEventListener('firebase-ready', () => {
    ['courses','restaurants','cafes'].forEach(cat => {
      const ref = window._fb.ref(window._fb.db, 'rooms/'+RK+'/'+cat);
      window._fb.onValue(ref, (snap) => {
        const data = snap.val() || {};
        const listEl = $('lst-'+cat);
        listEl.innerHTML = Object.entries(data).map(([key, item]) => `
          <div class="card">
            <strong>${item.name}</strong><br><small>${item.address || ''}</small><br>
            <button class="nbtn" onclick="openNavi('${(item.address || '').replace(/'/g, "\\'")}')">🚗 U+카카오내비 시작</button>
          </div>
        `).join('');
      });
    });
  });
}

function goPage(p, btn) {
  document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(el => el.classList.remove('on'));
  $( 'pg-' + p ).classList.add('on');
  btn.classList.add('on');
}
</script>
</body>
</html>
