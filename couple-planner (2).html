<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리 둘만의 공간 ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, update }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
  const firebaseConfig = {
    apiKey:"AIzaSyCItutGKUCET2VyDOuHcA3yemaAIlCcqBo",
    authDomain:"text-85ec2.firebaseapp.com",
    databaseURL:"https://text-85ec2-default-rtdb.firebaseio.com",
    projectId:"text-85ec2",
    storageBucket:"text-85ec2.firebasestorage.app",
    messagingSenderId:"881067394604",
    appId:"1:881067394604:web:5d77e68acb58cc509f3389"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._fb = { db, ref, onValue, set, remove, update };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2fc31a383f6d190a8f058919d1623966&libraries=services"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#C8506A;--rose-l:#ECA0B3;--blush:#FAEEF2;
  --sand:#F7F1EC;--ink:#1C1A1A;--muted:#9A9086;
  --border:rgba(200,80,106,0.15);--r:16px;
  --shadow:0 4px 24px rgba(200,80,106,0.10);
}
html,body{min-height:100vh;background:var(--sand);font-family:'Pretendard',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}

/* 로그인 */
#scr-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#fdf0f4,var(--sand))}
.lw{width:100%;max-width:360px;text-align:center}
.lheart{font-size:54px;animation:hb 2.4s ease-in-out infinite;display:block;margin-bottom:10px}
@keyframes hb{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.1)}56%{transform:scale(1)}}
.ltitle{font-family:'Nanum Myeongjo',serif;font-size:28px;color:var(--rose);margin-bottom:6px}
.lsub{font-size:13px;color:var(--muted);margin-bottom:28px}
.lcard{background:#fff;border-radius:24px;padding:28px 24px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:left}
.lcard label{display:block;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.linp{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:'Pretendard',sans-serif;background:var(--blush);color:var(--ink);outline:none;transition:.2s}
.linp:focus{border-color:var(--rose);background:#fff}
.lbtn{width:100%;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;margin-top:16px;transition:.2s}
.lbtn:hover{background:#a83c58}
.lerr{background:#fff0f3;border:1px solid #f8c0cb;color:#9b2c42;border-radius:10px;padding:10px 14px;font-size:13px;margin-top:10px;display:none}
.lerr.show{display:block}

/* 앱 메인 */
#scr-app{display:none;max-width:700px;margin:0 auto;padding-bottom:80px}
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between}
.hdr h2{font-family:'Nanum Myeongjo',serif;font-size:18px;color:var(--rose)}
.hdr-dday{font-size:12px;color:var(--muted);margin-top:2px}
.hdr-out{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}

.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:61px;z-index:59}
.nav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:68px;padding:10px 4px 9px;font-size:11px;font-family:'Pretendard',sans-serif;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.nb .ni{display:block;font-size:16px;margin-bottom:3px}
.nb.on{color:var(--rose);border-bottom-color:var(--rose);font-weight:600}

.pg{display:none;padding:16px}
.pg.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.sec{font-family:'Nanum Myeongjo',serif;font-size:16px;color:var(--rose);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.addbtn{width:100%;padding:11px;margin-bottom:14px;background:var(--blush);border:1.5px dashed var(--rose-l);border-radius:var(--r);color:var(--rose);font-size:13px;font-weight:500;cursor:pointer}

/* 카드 */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.card-hd{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;user-select:none}
.card-hd-body{flex:1;min-width:0}
.card-hd-name{font-size:15px;font-weight:600}
.card-hd-date{font-size:11px;color:var(--rose);font-weight:500;margin-bottom:3px}
.card-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--blush);color:var(--rose);white-space:nowrap}
.visited-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#e8f8ef;color:#1e7d45;font-weight:600}
.card-arrow{font-size:12px;color:var(--muted);transition:transform .25s}
.card.open .card-arrow{transform:rotate(180deg)}
.card-bd{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.card.open .card-bd{display:block}
.card-sub{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}

/* 버튼 */
.mapbtns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mbtn{font-size:11px;padding:5px 11px;border-radius:20px;border:none;cursor:pointer;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.mbtn.kk{background:#FEE500;color:#3A1D1D}
.mbtn.nv{background:#03C75A;color:#fff}
.mbtn.na{background:#1a73e8;color:#fff}

.card-ft{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);align-items:center}
.cbtn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.vbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-weight:600;margin-left:auto}
.vbtn.on{background:#e8f8ef;color:#1e7d45;border-color:#7ecfa0}

/* 체크리스트 */
.chkbar{display:flex;gap:8px;margin-bottom:14px}
.chkbar input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--blush);outline:none}
.chkbar button{padding:11px 16px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-weight:600}
.chki{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
.chki.done{opacity:.5}
.chk-lbl{flex:1;font-size:14px}
.chki.done .chk-lbl{text-decoration:line-through}

/* 설정 */
.setcard{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.setsave{width:100%;padding:13px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-weight:600;margin-top:6px}

/* 모달 */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.mbg.on{display:flex}
.modal{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:26px 20px 36px;max-height:92vh;overflow-y:auto}
.modal-ttl{font-family:'Nanum Myeongjo',serif;font-size:19px;color:var(--rose);margin-bottom:18px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;background:var(--blush);outline:none}
.mfoot{display:flex;gap:10px;margin-top:20px}
.mfoot button{flex:1;padding:13px;border-radius:11px;font-weight:600;border:none}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:#1C1A1A;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;z-index:999;transition:transform .3s ease}
#toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="scr-login">
  <div class="lw">
    <span class="lheart">♡</span>
    <h1 class="ltitle">우리 둘만의 공간</h1>
    <div class="lcard">
      <label>비밀번호</label>
      <input class="linp" type="password" id="pw" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')login()">
      <button class="lbtn" id="lbtn" onclick="login()">입장하기</button>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>

<div id="scr-app">
  <div class="hdr">
    <div>
      <h2 id="hdr-name">우리 둘만의 공간 ♡</h2>
      <div class="hdr-dday" id="hdr-dday"></div>
    </div>
    <button class="hdr-out" onclick="logout()">나가기</button>
  </div>
  <nav class="nav">
    <button class="nb on" onclick="goPage('courses',this)"><span class="ni">🗺️</span>코스</button>
    <button class="nb" onclick="goPage('restaurants',this)"><span class="ni">🍽️</span>맛집</button>
    <button class="nb" onclick="goPage('cafes',this)"><span class="ni">☕</span>카페</button>
    <button class="nb" onclick="goPage('checklist',this)"><span class="ni">✅</span>체크</button>
    <button class="nb" onclick="goPage('settings',this)"><span class="ni">⚙️</span>설정</button>
  </nav>

  <div class="pg on" id="pg-courses">
    <button class="addbtn" onclick="openAdd('courses')">+ 데이트 코스 추가</button>
    <div id="lst-courses"></div>
  </div>
  <div class="pg" id="pg-restaurants">
    <button class="addbtn" onclick="openAdd('restaurants')">+ 맛집 추가</button>
    <div id="lst-restaurants"></div>
  </div>
  <div class="pg" id="pg-cafes">
    <button class="addbtn" onclick="openAdd('cafes')">+ 카페 추가</button>
    <div id="lst-cafes"></div>
  </div>
  <div class="pg" id="pg-checklist">
    <div class="chkbar"><input type="text" id="chk-inp" placeholder="할 일 입력…"><button onclick="addCheck()">추가</button></div>
    <div id="lst-checklist"></div>
  </div>
  <div class="pg" id="pg-settings">
    <div class="setcard">
      <div class="fg"><label>내 이름</label><input type="text" id="s1"></div>
      <div class="fg"><label>상대방 이름</label><input type="text" id="s2"></div>
      <div class="fg"><label>사귄 날짜</label><input type="date" id="sa"></div>
      <button class="setsave" onclick="saveSet()">저장하기</button>
    </div>
  </div>
</div>

<div class="mbg" id="mbg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-ttl" id="m-ttl">추가</div>
    <div id="m-body"></div>
    <div class="mfoot">
      <button class="mcancel" onclick="closeModal()">취소</button>
      <button class="msave" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
var RK=null; var DB={}; var UNSUBS=[]; var M_TYPE=''; var M_KEY=null;
function $(i){return document.getElementById(i)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2200)}
function fb(){return window._fb}
function rr(path){return fb().ref(fb().db,'rooms/'+RK+(path?'/'+path:''))}

async function sha256(str){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function login(){
  var pw=$('pw').value.trim();
  if(!pw)return;
  RK=await sha256('couple_v1_'+pw);
  localStorage.setItem('RK',RK);
  enterApp();
}
function logout(){localStorage.removeItem('RK');location.reload();}
function enterApp(){$('scr-login').style.display='none';$('scr-app').style.display='block';subscribeAll();}

function subscribeAll(){
  ['courses','restaurants','cafes','checklist','settings'].forEach(cat=>{
    var u=fb().onValue(rr(cat),snap=>{DB[cat]=snap.val()||{};render(cat);refreshHdr();});
    UNSUBS.push(u);
  });
}

function refreshHdr(){
  var s=DB.settings||{};
  if(s.name1&&s.name2)$('hdr-name').textContent=s.name1+' ♡ '+s.name2;
  if(s.anniversary){
    var d=Math.floor((Date.now()-new Date(s.anniversary))/864e5)+1;
    $('hdr-dday').textContent='함께한 지 D+'+d+'일';
  }
}

function render(cat){
  if(cat==='settings')return;
  var el=$('lst-'+cat); if(!el)return;
  var items=Object.entries(DB[cat]||{});
  el.innerHTML=items.map(kv=>makeCard(kv[0],kv[1],cat)).join('');
}

function makeCard(key,item,cat){
  var enc=encodeURIComponent(item.address||'');
  var mapH=item.address?`<div class="mapbtns">
    <a class="mbtn kk" href="https://map.kakao.com/link/search/${enc}" target="_blank">🗺 카카오맵</a>
    <button class="mbtn na" onclick="openNavi('${item.address.replace(/'/g,"\\'")}')">🚗 U+카카오내비</button>
  </div>`:'';
  
  return `<div class="card" id="cd-${key}">
    <div class="card-hd" onclick="toggleCard('${key}')">
      <div class="card-hd-body"><div class="card-hd-name">${item.name}</div></div>
      <span class="card-arrow">▼</span>
    </div>
    <div class="card-bd">
      ${item.address?`<div class="card-sub">📍 ${item.address}</div>`:''}
      ${mapH}
      <div class="card-ft">
        <button class="cbtn" onclick="openEdit('${key}','${cat}')">수정</button>
        <button class="cbtn" onclick="delItem('${key}','${cat}')">삭제</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(key){$('cd-'+key).classList.toggle('open')}
async function delItem(key,cat){if(confirm('삭제?')) await fb().remove(rr(cat+'/'+key))}

// ── U+카카오내비 수정 핵심 로직 ──────────────────────────
function openNavi(address) {
  if (!address) { toast('주소가 없어요'); return; }
  toast('U+카카오내비 연결 중…');

  // Vercel 프록시 서버 주소
  const proxyUrl = 'https://kakao-proxy-fi653dowu-greenjojaeyeol-4549s-projects.vercel.app/v2/local/search/address.json?query=';

  fetch(proxyUrl + encodeURIComponent(address))
    .then(r => r.json())
    .then(data => {
      const doc = data.documents && data.documents[0];
      const name = encodeURIComponent(address);
      
      if (doc) {
        const lat = doc.y; const lng = doc.x;
        // com.lguplus.navi 패키지를 명시한 인텐트 스킴
        const intent = `intent://route?ep=${lng},${lat},${name}&by=CAR#Intent;scheme=kakaonavi;package=com.lguplus.navi;end`;
        window.location.href = intent;

        // 앱 미설치 시 브라우저용 런처 페이지로 이동
        setTimeout(() => {
          window.open(`https://kakaonavi.kakao.com/launch/index.do?ep=${lng},${lat},${name}&by=CAR`, '_blank');
        }, 1500);
      } else {
        // 좌표 실패 시 검색 모드 실행
        window.location.href = `intent://search?q=${name}#Intent;scheme=kakaonavi;package=com.lguplus.navi;end`;
      }
    })
    .catch(() => {
      window.open('https://map.kakao.com/link/search/' + encodeURIComponent(address), '_blank');
    });
}

function openAdd(cat){M_TYPE=cat;M_KEY=null;$('m-body').innerHTML='<div class="fg"><label>이름</label><input id="f-name"></div><div class="fg"><label>주소</label><input id="f-addr"></div>';$('mbg').classList.add('on')}
function openEdit(key,cat){M_TYPE=cat;M_KEY=key;var d=DB[cat][key];$('m-body').innerHTML=`<div class="fg"><label>이름</label><input id="f-name" value="${d.name}"></div><div class="fg"><label>주소</label><input id="f-addr" value="${d.address||''}"></div>`;$('mbg').classList.add('on')}
function closeModal(){$('mbg').classList.remove('on')}
function bgClick(e){if(e.target===$('mbg'))closeModal()}

async function saveModal(){
  var item={name:$('f-name').value, address:$('f-addr').value, ts:Date.now()};
  await fb().set(rr(M_TYPE+'/'+(M_KEY||uid())),item);
  closeModal();
}

async function saveSet(){
  await fb().set(rr('settings'),{name1:$('s1').value, name2:$('s2').value, anniversary:$('sa').value});
  toast('저장됨 ♡');
}

function goPage(page,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  $('pg-'+page).classList.add('on'); btn.classList.add('on');
}

window.addEventListener('firebase-ready',function(){
  var saved=localStorage.getItem('RK'); if(saved){RK=saved;enterApp();}
});
</script>
</body>
</html>
