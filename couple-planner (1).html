<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리 둘만의 공간 ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#C8506A;--rose-l:#ECA0B3;--blush:#FAEEF2;
  --sand:#F7F1EC;--ink:#1C1A1A;--muted:#9A9086;
  --border:rgba(200,80,106,0.15);--r:16px;
  --shadow:0 4px 24px rgba(200,80,106,0.10);
}
html,body{min-height:100vh;background:var(--sand);font-family:'Pretendard',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}

/* 로그인 */
#scr-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#fdf0f4,var(--sand))}
.lw{width:100%;max-width:360px;text-align:center}
.lheart{font-size:54px;animation:hb 2.4s ease-in-out infinite;display:block;margin-bottom:10px}
@keyframes hb{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.1)}56%{transform:scale(1)}}
.ltitle{font-family:'Nanum Myeongjo',serif;font-size:28px;color:var(--rose);margin-bottom:6px}
.lsub{font-size:13px;color:var(--muted);margin-bottom:28px}
.lcard{background:#fff;border-radius:24px;padding:28px 24px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:left}
.lcard label{display:block;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.linp{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:'Pretendard',sans-serif;background:var(--blush);color:var(--ink);outline:none;transition:.2s}
.linp:focus{border-color:var(--rose);background:#fff}
.lhint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}
.lbtn{width:100%;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;margin-top:16px;transition:.2s}
.lbtn:hover{background:#a83c58}
.lbtn:disabled{opacity:.6;cursor:not-allowed}
.lerr{background:#fff0f3;border:1px solid #f8c0cb;color:#9b2c42;border-radius:10px;padding:10px 14px;font-size:13px;margin-top:10px;display:none}
.lerr.show{display:block}

/* 앱 */
#scr-app{display:none;max-width:700px;margin:0 auto;padding-bottom:80px}

/* 날씨바 */
.wbar{background:linear-gradient(135deg,#5b6fd4,#6b4f9e);padding:14px 18px 10px;color:#fff;position:relative}
.wbar-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.wbar-main{display:flex;align-items:center;gap:14px}
.wbar-ico{font-size:32px;line-height:1}
.wbar-temp{font-size:28px;font-weight:600;line-height:1}
.wbar-desc{font-size:12px;opacity:.85;margin-top:3px}
.wbar-clock{text-align:right}
.wbar-time{font-size:22px;font-weight:600;line-height:1;letter-spacing:1px}
.wbar-date{font-size:11px;opacity:.75;margin-top:3px}
.wbar-sub{display:flex;gap:14px;flex-wrap:wrap}
.wsi{display:flex;align-items:center;gap:4px;font-size:12px;opacity:.9}
.wsi-ico{font-size:13px}
.wbar-src{font-size:10px;opacity:.55;margin-top:8px;text-align:right}

/* 헤더 */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between}
.hdr h2{font-family:'Nanum Myeongjo',serif;font-size:17px;color:var(--rose)}
.hdr-dday{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-out{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Pretendard',sans-serif}

/* 탭 */
.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:59}
.nav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:60px;padding:10px 4px 9px;font-size:11px;font-family:'Pretendard',sans-serif;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.nb .ni{display:block;font-size:15px;margin-bottom:2px}
.nb.on{color:var(--rose);border-bottom-color:var(--rose);font-weight:600}

/* 페이지 */
.pg{display:none;padding:14px}
.pg.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sec{font-family:'Nanum Myeongjo',serif;font-size:15px;color:var(--rose);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.addbtn{width:100%;padding:11px;margin-bottom:10px;background:var(--blush);border:1.5px dashed var(--rose-l);border-radius:var(--r);color:var(--rose);font-size:13px;font-weight:500;font-family:'Pretendard',sans-serif;cursor:pointer;transition:.2s}
.addbtn:hover{background:var(--rose);color:#fff;border-style:solid}

/* 필터바 */
.fbar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
.fbar::-webkit-scrollbar{display:none}
.fbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:500;white-space:nowrap;transition:.15s;flex-shrink:0}
.fbtn.on{background:var(--rose);color:#fff;border-color:var(--rose)}
.fbar-div{width:1px;background:var(--border);flex-shrink:0;margin:3px 2px}

/* 카드 */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.card-hd{display:flex;align-items:center;gap:8px;padding:13px;cursor:pointer;user-select:none}
.card-hd-body{flex:1;min-width:0}
.card-hd-name{font-size:14px;font-weight:600}
.card-hd-date{font-size:11px;color:var(--rose);font-weight:500;margin-bottom:2px}
.card-tag{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--blush);color:var(--rose);font-weight:500;white-space:nowrap;flex-shrink:0}
.vbadge{font-size:11px;padding:2px 9px;border-radius:20px;background:#e8f8ef;color:#1e7d45;font-weight:600;flex-shrink:0}
.arrow{font-size:11px;color:var(--muted);flex-shrink:0;transition:transform .25s}
.card.open .arrow{transform:rotate(180deg)}
.card-bd{display:none;padding:0 13px 13px;border-top:1px solid var(--border)}
.card.open .card-bd{display:block}
.card-sub{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.5}

/* 시간 뱃지 */
.tbadge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;margin-top:4px;font-weight:500}
.tbadge.open{background:#e8f8ef;color:#1e7d45}
.tbadge.closed{background:#fceaea;color:#a32d2d}
.tbadge.soon{background:#fff3e0;color:#e65100}
.tbadge.before{background:#f3f3f3;color:#444}

/* 지도버튼 */
.mapbtns{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.mbtn{font-size:11px;padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:600;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.mbtn.kk{background:#FEE500;color:#3A1D1D}
.mbtn.nv{background:#03C75A;color:#fff}
.mbtn.na{background:#1a73e8;color:#fff}

/* 스텝 */
.steps{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.step-r{display:flex;align-items:flex-start;gap:7px}
.step-dot{width:20px;height:20px;border-radius:50%;background:var(--rose);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.step-t{font-size:12px;color:var(--muted);padding-top:2px}

/* 카드 푸터 */
.card-ft{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center}
.cbtn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s}
.cbtn:hover{background:var(--sand)}
.cbtn.del:hover{background:#fceaea;color:#a32d2d;border-color:#f5aaaa}
.vbtn{font-size:11px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:600;margin-left:auto;transition:.2s}
.vbtn.on{background:#e8f8ef;color:#1e7d45;border-color:#7ecfa0}

/* 체크 */
.chkbar{display:flex;gap:8px;margin-bottom:12px}
.chkbar input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:'Pretendard',sans-serif;background:var(--blush);color:var(--ink);outline:none;transition:.2s}
.chkbar input:focus{border-color:var(--rose);background:#fff}
.chkbar button{padding:10px 14px;background:var(--rose);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif}
.chki{display:flex;align-items:center;gap:11px;padding:12px 13px;background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;user-select:none}
.chki.dragging{opacity:.5;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.chki.drag-over{border:2px dashed var(--rose);background:var(--blush)}
.chk-handle{font-size:14px;color:var(--muted);padding:0 2px;flex-shrink:0;touch-action:none;cursor:grab;user-select:none}
.chki.done{opacity:.5}
.chk-c{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
.chki.done .chk-c{background:var(--rose);border-color:var(--rose)}
.chk-ck{color:#fff;font-size:11px;font-weight:700;opacity:0}
.chki.done .chk-ck{opacity:1}
.chk-lbl{flex:1;font-size:14px}
.chki.done .chk-lbl{text-decoration:line-through}
.chk-del{background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;opacity:0;line-height:1;padding:0 2px}
.chki:hover .chk-del{opacity:1}

/* 통계 */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--blush);border-radius:13px;padding:14px;text-align:center}
.stat-n{font-size:26px;color:var(--rose);font-family:'Nanum Myeongjo',serif}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}

/* 설정 */
.setcard{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.setsave{width:100%;padding:12px;background:var(--rose);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;margin-top:6px}

/* 휴무일 선택 */
.days-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.day-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s;flex-shrink:0}
.day-btn.on{background:var(--rose);color:#fff;border-color:var(--rose)}
.tbadge.holiday{background:#fceaea;color:#a32d2d}

/* 드라이브 뱃지 */
.drive-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:#1a56a0;background:#e8f0fe;padding:3px 10px;border-radius:20px;margin-top:6px;margin-bottom:2px}

/* 즐겨찾기 버튼 */
.fav-btn{font-size:15px!important;padding:2px 8px!important}
.fav-btn.on{color:#f5a623;border-color:#f5a623;background:#fff8ee}

/* 드래그 핸들 */
.card.dragging{opacity:.5;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.card.drag-over{border:2px dashed var(--rose);background:var(--blush)}
.drag-handle{font-size:15px;color:var(--muted);padding:0 4px;flex-shrink:0;touch-action:none;cursor:grab;user-select:none}

/* 빈/로딩 */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-i{font-size:34px;margin-bottom:8px}
.empty-t{font-size:13px}
.loading{text-align:center;padding:28px;color:var(--muted);font-size:13px}

/* 모달 */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.mbg.on{display:flex}
.modal{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:24px 18px 36px;max-height:92vh;overflow-y:auto;animation:mup .25s ease}
@keyframes mup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-ttl{font-family:'Nanum Myeongjo',serif;font-size:18px;color:var(--rose);margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.05em;margin-bottom:5px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Pretendard',sans-serif;background:var(--blush);color:var(--ink);outline:none;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--rose);background:#fff}
.fg textarea{height:75px;resize:none}
.mfoot{display:flex;gap:10px;margin-top:18px}
.mfoot button{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;border:none}
.mcancel{background:var(--sand);color:var(--muted)}
.msave{background:var(--rose);color:#fff}

/* 토스트 */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);background:#1C1A1A;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;pointer-events:none;white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.modal{max-height:96vh}}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="scr-login">
  <div class="lw">
    <span class="lheart">♡</span>
    <h1 class="ltitle">우리 둘만의 공간</h1>
    <p class="lsub">같은 비밀번호로 연결돼요</p>
    <div class="lcard">
      <label>비밀번호</label>
      <input class="linp" type="password" id="pw" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
      <p class="lhint">둘이 똑같은 비밀번호 → 같은 공간 연결<br>처음 입력하면 새 공간이 자동으로 만들어져요 🌸</p>
      <button class="lbtn" id="lbtn" onclick="doLogin()">입장하기</button>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>

<!-- 앱 -->
<div id="scr-app">
  <!-- 날씨바 -->
  <div class="wbar" id="wbar"><div class="wi"><span class="wi-ico">⏳</span><span class="wi-val">--</span><span class="wi-lbl">날씨</span></div></div>

  <!-- 헤더 -->
  <div class="hdr">
    <div>
      <h2 id="hdr-name">우리 둘만의 공간 ♡</h2>
      <div class="hdr-dday" id="hdr-dday"></div>
    </div>
    <button class="hdr-out" onclick="doLogout()">나가기</button>
  </div>

  <!-- 탭 -->
  <nav class="nav">
    <button class="nb on" onclick="goPage('courses',this)"><span class="ni">🗺️</span>코스</button>
    <button class="nb" onclick="goPage('restaurants',this)"><span class="ni">🍽️</span>맛집</button>
    <button class="nb" onclick="goPage('cafes',this)"><span class="ni">☕</span>카페</button>
    <button class="nb" onclick="goPage('plans',this)"><span class="ni">📅</span>일정</button>
    <button class="nb" onclick="goPage('checklist',this)"><span class="ni">✅</span>체크</button>
    <button class="nb" onclick="goPage('settings',this)"><span class="ni">⚙️</span>설정</button>
  </nav>

  <div class="pg on" id="pg-courses">
    <button class="addbtn" onclick="openAdd('courses')">+ 데이트 코스 추가</button>
    <div class="fbar" id="fb-courses"></div>
    <div class="sec">저장된 코스</div>
    <div id="lst-courses"><div class="loading">불러오는 중…</div></div>
  </div>
  <div class="pg" id="pg-restaurants">
    <button class="addbtn" onclick="openAdd('restaurants')">+ 맛집 추가</button>
    <div class="fbar" id="fb-restaurants"></div>
    <div class="sec">우리만의 맛집 리스트</div>
    <div id="lst-restaurants"><div class="loading">불러오는 중…</div></div>
  </div>
  <div class="pg" id="pg-cafes">
    <button class="addbtn" onclick="openAdd('cafes')">+ 카페 추가</button>
    <div class="fbar" id="fb-cafes"></div>
    <div class="sec">좋아하는 카페</div>
    <div id="lst-cafes"><div class="loading">불러오는 중…</div></div>
  </div>
  <div class="pg" id="pg-plans">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sn-c">0</div><div class="stat-l">저장된 코스</div></div>
      <div class="stat"><div class="stat-n" id="sn-p">0</div><div class="stat-l">맛집·카페</div></div>
    </div>
    <button class="addbtn" onclick="openAdd('plans')">+ 데이트 일정 추가</button>
    <div class="fbar" id="fb-plans"></div>
    <div class="sec">데이트 일정</div>
    <div id="lst-plans"><div class="loading">불러오는 중…</div></div>
  </div>
  <div class="pg" id="pg-checklist">
    <div class="chkbar">
      <input type="text" id="chk-inp" placeholder="할 일 입력…" onkeydown="if(event.key==='Enter')addCheck()">
      <button onclick="addCheck()">추가</button>
    </div>
    <div class="sec">할 일 목록</div>
    <div id="lst-checklist"><div class="loading">불러오는 중…</div></div>
  </div>
  <div class="pg" id="pg-settings">
    <div class="sec">커플 정보</div>
    <div class="setcard">
      <div class="fg"><label>내 이름</label><input type="text" id="s1" placeholder="내 이름"></div>
      <div class="fg"><label>상대방 이름</label><input type="text" id="s2" placeholder="상대방 이름"></div>
      <div class="fg"><label>사귄 날짜</label><input type="date" id="sa"></div>
      <button class="setsave" onclick="saveSet()">저장하기</button>
    </div>
    <div class="sec" style="margin-top:18px">연결 방식</div>
    <div class="setcard" style="font-size:13px;color:var(--muted);line-height:1.8">
      같은 비밀번호 입력 시 같은 공간으로 연결돼요.<br>
      <span style="color:var(--rose);font-size:12px">⚠ 비밀번호가 다르면 다른 공간으로 연결됩니다.</span>
    </div>
  </div>
</div>

<!-- 모달 -->
<div class="mbg" id="mbg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-ttl" id="m-ttl">추가</div>
    <div id="m-body"></div>
    <div class="mfoot">
      <button class="mcancel" onclick="closeModal()">취소</button>
      <button class="msave" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- 카카오맵 JS SDK (선택적 로드 - 실패해도 앱 동작) -->
<script>
(function(){
  var s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey=2fc31a383f6d190a8f058919d1623966&libraries=services&autoload=false';
  s.async=true;
  s.onload=function(){
    kakao.maps.load(function(){window._kakaoReady=true;});
  };

// ── SHA256 ────────────────────────────────────────────
async function sha256(s){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}

var KAKAO_REST='b67c5d797ab1def425ed459c1c7c42c1';

function geocodeAddr(addr,cb){
  // 1차: 주소 검색
  fetch('https://dapi.kakao.com/v2/local/search/address.json?query='+encodeURIComponent(addr),{
    headers:{'Authorization':'KakaoAK '+KAKAO_REST}
  }).then(function(r){return r.json()})
  .then(function(d){
    var doc=d.documents&&d.documents[0];
    if(doc){cb(parseFloat(doc.y),parseFloat(doc.x));return;}
    // 2차: 키워드 검색 (상호명으로 등록된 경우)
    fetch('https://dapi.kakao.com/v2/local/search/keyword.json?query='+encodeURIComponent(addr)+'&size=1',{
      headers:{'Authorization':'KakaoAK '+KAKAO_REST}
    }).then(function(r){return r.json()})
    .then(function(d2){
      var doc2=d2.documents&&d2.documents[0];
      if(doc2)cb(parseFloat(doc2.y),parseFloat(doc2.x));
      else cb(null,null);
    }).catch(function(){cb(null,null);});
  }).catch(function(){cb(null,null);});
}

function callDirections(key,lat,lon,dist,cb){
  // 카카오 모빌리티 Directions — Vercel 프록시 경유 (CORS 우회)
  var url='https://kakao-proxy-seven.vercel.app/api/directions'
    +'?ox='+USER_LON+'&oy='+USER_LAT
    +'&dx='+lon+'&dy='+lat
    +'&priority=RECOMMEND';
  var now=new Date();
  fetch(url)
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.duration!=null){
      var rv={
        duration:d.duration,   // 초
        distance:d.distance,   // m
        dist:dist,
        ts:Date.now(),
        updatedAt:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')
      };
      ROUTE_CACHE[key]=rv; cb(rv);
    }else{
      var rv={dist:dist,duration:null,distance:null,ts:Date.now()};
      ROUTE_CACHE[key]=rv; cb(rv);
    }
  }).catch(function(){
    var rv={dist:dist,duration:null,distance:null,ts:Date.now()};
    ROUTE_CACHE[key]=rv; cb(rv);
  });
}

// Haversine 직선거리 (m)
function haversine(la1,lo1,la2,lo2){
  var R=6371000,dLat=(la2-la1)*Math.PI/180,dLon=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fetchRoute(key,addr,cb){
  if(!USER_LAT||!addr){if(cb)cb(null);return}
  if(GEOCODE_CACHE[key]&&GEOCODE_CACHE[key].lat){
    var lat=GEOCODE_CACHE[key].lat,lon=GEOCODE_CACHE[key].lon;
    callDirections(key,lat,lon,haversine(USER_LAT,USER_LON,lat,lon),cb);
  }else{
    geocodeAddr(addr,function(lat,lon){
      if(!lat||!lon){if(cb)cb(null);return}
      GEOCODE_CACHE[key]={lat:lat,lon:lon};
      fb().set(fb().ref(fb().db,'rooms/'+RK+'/geocode_cache/'+key),{lat:lat,lon:lon}).catch(function(){});
      callDirections(key,lat,lon,haversine(USER_LAT,USER_LON,lat,lon),cb);
    });
  }

function timeBadge(ot,ct,lo,bt_s,bt_e,allday,closed_days){
  if(closed_days&&closed_days.length){
    var todayIdx=new Date().getDay();
    if(closed_days.indexOf(todayIdx)>=0){
      var dayNames=['일','월','화','수','목','금','토'];
      var closedStr=closed_days.map(function(d){return dayNames[d]}).join('·');
      return'<span class="tbadge holiday">🔴 정기휴무 ('+closedStr+')</span>';
    }
  }
  if(allday)return'<span class="tbadge open">🟢 24시간 영업</span>';
  if(!ot||!ct)return'';
  var now=new Date(),cur=now.getHours()*60+now.getMinutes();
  var op=toMin(ot),cl=toMin(ct);
  var loMin=lo?toMin(lo):null;
  var bt_sMin=bt_s?toMin(bt_s):null,bt_eMin=bt_e?toMin(bt_e):null;
  // 마감 이후
  if(cur>=cl)return'<span class="tbadge closed">🔴 마감 '+ct+'</span>';
  // 오픈 30분 이내 (오픈예정)
  if(cur<op&&cur>=op-30)return'<span class="tbadge soon">🟡 오픈예정 '+ot+'</span>';
  // 오픈 전 (30분 초과)
  if(cur<op)return'<span class="tbadge before">⚫ 오픈 전 '+ot+' 영업 시작</span>';
  // 브레이크타임
  if(bt_sMin&&bt_eMin&&cur>=bt_sMin&&cur<bt_eMin)
    return'<span class="tbadge soon">🟠 브레이크타임 ~'+bt_e+'</span>';
  // 라스트오더 지남
  if(loMin&&cur>=loMin)return'<span class="tbadge soon">🟡 라스트오더 '+lo+'</span>';
  // 마감 30분 이내
  if(cur>=cl-30)return'<span class="tbadge soon">🟡 마감임박 ~'+ct+'</span>';
  // 영업 중
  return'<span class="tbadge open">🟢 영업중 ~'+ct+'</span>';
}

var chkDragKey=null,chkTouchEl=null;

function renderChk(){
  var el=g('lst-checklist');
  var items=Object.entries(DB.checklist||{});
  if(!items.length){el.innerHTML='<div class="empty"><div class="empty-i">✅</div><div class="empty-t">할 일을 추가해보세요</div></div>';return}
  // order 기준 정렬, order 없으면 done 상태로
  items.sort(function(a,b){
    var ao=a[1].order!==undefined?a[1].order:99999+(a[1].done?1:0);
    var bo=b[1].order!==undefined?b[1].order:99999+(b[1].done?1:0);
    return ao-bo;
  });
  el.innerHTML=items.map(function(kv){
    var k=kv[0],v=kv[1];
    return'<div class="chki'+(v.done?' done':'')+'" id="chki-'+k+'" data-key="'+k+'"'
      +' draggable="true"'
      +' ondragstart="chkDragStart(event)" ondragover="chkDragOver(event)" ondrop="chkDrop(event)" ondragend="chkDragEnd(event)"'
      +' ontouchstart="chkTouchStart(event)" ontouchmove="chkTouchMove(event)" ontouchend="chkTouchEnd(event)"'
      +' onclick="toggleChk(\''+k+'\')">'
      +'<span class="chk-handle" onclick="event.stopPropagation()">⠿</span>'
      +'<div class="chk-c"><span class="chk-ck">✓</span></div>'
      +'<div class="chk-lbl">'+esc(v.text||'')+'</div>'
      +'<button class="chk-del" onclick="event.stopPropagation();delChk(\''+k+'\')">×</button>'
      +'</div>';
  }).join('');
}

// 체크리스트 드래그
function chkDragStart(e){
  chkDragKey=e.currentTarget.dataset.key;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function chkDragOver(e){
  e.preventDefault();
  document.querySelectorAll('.chki.drag-over').forEach(function(el){el.classList.remove('drag-over')});
  e.currentTarget.classList.add('drag-over');
}
function chkDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.chki.drag-over').forEach(function(el){el.classList.remove('drag-over')});
}
async function chkDrop(e){
  e.preventDefault();
  var toKey=e.currentTarget.dataset.key;
  if(!chkDragKey||chkDragKey===toKey)return;
  e.currentTarget.classList.remove('drag-over');
  var container=g('lst-checklist');
  var domItems=Array.from(container.querySelectorAll('.chki[data-key]'));
  var keys=domItems.map(function(el){return el.dataset.key});
  var fi=keys.indexOf(chkDragKey),ti=keys.indexOf(toKey);
  if(fi<0||ti<0)return;
  keys.splice(fi,1);keys.splice(ti,0,chkDragKey);
  var updates={};
  keys.forEach(function(k,i){updates['checklist/'+k+'/order']=i});
  await fb().update(rr(''),updates);
  chkDragKey=null;
}
// 체크리스트 터치 드래그
function chkTouchStart(e){
  var h=e.target.closest('.chk-handle');if(!h)return;
  chkTouchEl=e.currentTarget;chkTouchEl.classList.add('dragging');
}
function chkTouchMove(e){
  if(!chkTouchEl)return;
  e.preventDefault();
  var y=e.touches[0].clientY,x=e.touches[0].clientX;
  var els=document.elementsFromPoint(x,y);
  var target=els.find(function(el){return el.classList&&el.classList.contains('chki')&&el!==chkTouchEl});
  document.querySelectorAll('.chki.drag-over').forEach(function(el){el.classList.remove('drag-over')});
  if(target)target.classList.add('drag-over');
}
async function chkTouchEnd(e){
  if(!chkTouchEl)return;
  var over=document.querySelector('.chki.drag-over');
  if(over&&over!==chkTouchEl){
    var fromKey=chkTouchEl.dataset.key,toKey=over.dataset.key;
    var container=g('lst-checklist');
    var domItems=Array.from(container.querySelectorAll('.chki[data-key]'));
    var keys=domItems.map(function(el){return el.dataset.key});
    var fi=keys.indexOf(fromKey),ti=keys.indexOf(toKey);
    if(fi>=0&&ti>=0){
      keys.splice(fi,1);keys.splice(ti,0,fromKey);
      var updates={};
      keys.forEach(function(k,i){updates['checklist/'+k+'/order']=i});
      await fb().update(rr(''),updates);
    }
  }
  chkTouchEl.classList.remove('dragging');
  document.querySelectorAll('.chki.drag-over').forEach(function(el){el.classList.remove('drag-over')});
  chkTouchEl=null;
}

// ── 날씨 (Open-Meteo) ────────────────────────────────
function loadWeather(){
  if(!navigator.geolocation){
    g('wbar').innerHTML='<div class="wbar-main"><span class="wbar-desc">위치 권한을 허용하면 날씨가 표시돼요 🌤️</span></div>';
    return;
  }

  // ① 이전 날씨 캐시 즉시 표시 (빠른 로딩)
  try{
    var cached=localStorage.getItem('weather_cache');
    if(cached){
      var cw=JSON.parse(cached);
      var age=Date.now()-cw.ts;
      if(age<3600000){ // 1시간 이내면 즉시 표시
        setWbar(cw.ico,cw.tmp,cw.feel,cw.hum,cw.pm10,cw.pm25,cw.uv,cw.wind,'openmeteo');
      }
    }
  }catch(e){}

  // ② 백그라운드에서 최신 날씨 업데이트
  navigator.geolocation.getCurrentPosition(function(pos){
    var la=pos.coords.latitude,lo=pos.coords.longitude;
    USER_LAT=la;USER_LON=lo;
    loadLocation(la,lo);
    loadRouteCache();
    // 위치 세팅 후 카드 즉시 리렌더 (소요시간 표시)
    ['courses','restaurants','cafes'].forEach(function(cat){
      if(Object.keys(DB[cat]||{}).length>0)render(cat);
    });
    // 거리순 정렬 항목 자동 계산 (위치 확보 후 800ms 대기, DB 로드 여유)
    setTimeout(function(){
      ['restaurants','cafes'].forEach(function(cat){
        if(SORT[cat]==='거리순'){
          var toFetch=Object.entries(DB[cat]||{}).filter(function(kv){return kv[1].address&&ROUTE_CACHE[kv[0]]===undefined});
          if(!toFetch.length)return;
          var done=0,total=toFetch.length;
          toFetch.forEach(function(kv){
            fetchRoute(kv[0],kv[1].address,function(){
              if(++done>=total){render(cat);}
            });
          });
        }
      });
    },800);
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature,uv_index&timezone=Asia%2FSeoul')
    .then(function(r){return r.json()})
    .then(function(d){
      var c=d.current;
      var ico=wIcon(c.weathercode);
      var tmp=Math.round(c.temperature_2m);
      var feel=Math.round(c.apparent_temperature);
      var hum=c.relativehumidity_2m;
      var uv=Math.round(c.uv_index||0);
      var wind=Math.round(c.windspeed_10m);
      fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+la+'&longitude='+lo+'&current=pm10,pm2_5&timezone=Asia%2FSeoul')
      .then(function(r){return r.json()})
      .then(function(aq){
        var pm10=Math.round((aq.current&&aq.current.pm10)||0);
        var pm25=Math.round((aq.current&&aq.current.pm2_5)||0);
        setWbar(ico,tmp,feel,hum,pm10,pm25,uv,wind,'openmeteo');
        // 캐시 저장
        try{localStorage.setItem('weather_cache',JSON.stringify({ico,tmp,feel,hum,pm10,pm25,uv,wind,ts:Date.now()}))}catch(e){}
      }).catch(function(){
        setWbar(ico,tmp,feel,hum,null,null,uv,wind,'openmeteo');
        try{localStorage.setItem('weather_cache',JSON.stringify({ico,tmp,feel,hum,pm10:null,pm25:null,uv,wind,ts:Date.now()}))}catch(e){}
      });
    }).catch(function(){
      if(!localStorage.getItem('weather_cache'))
        g('wbar').innerHTML='<div class="wbar-main"><span class="wbar-desc">날씨를 불러올 수 없어요</span></div>';
    });
  },function(){
    if(!localStorage.getItem('weather_cache'))
      g('wbar').innerHTML='<div class="wbar-main"><span class="wbar-desc">위치 권한을 허용하면 날씨가 표시돼요 🌤️</span></div>';
  },{maximumAge:0,timeout:8000});
}

function setWbar(ico,tmp,feel,hum,pm10,pm25,uv,wind,src){
  var pm10g=pm10!==null?pmGrade(pm10,'pm10'):null;
  var pm25g=pm25!==null?pmGrade(pm25,'pm25'):null;
  var subItems=[
    wind?'<div class="wsi"><span class="wsi-ico">💨</span>'+wind+'m/s</div>':'',
    uv!==null?'<div class="wsi"><span class="wsi-ico">☀️</span>자외선 '+uvGrade(uv)+'</div>':'',
    pm10g?'<div class="wsi"><span class="wsi-ico">'+pm10g.i+'</span>미세 '+pm10g.l+'</div>':'',
    pm25g?'<div class="wsi"><span class="wsi-ico">'+pm25g.i+'</span>초미세 '+pm25g.l+'</div>':''
  ].filter(Boolean).join('');
  var srcTxt=src==='kma'?'📡 기상청':'📡 Open-Meteo';
  g('wbar').innerHTML=
    '<div class="wbar-top">'
      +'<div class="wbar-main">'
        +'<span class="wbar-ico">'+ico+'</span>'
        +'<div>'
          +'<div class="wbar-temp">'+(tmp!==null?tmp+'°':'--')+'</div>'
          +'<div class="wbar-desc">'+(feel&&feel!=='--'?'체감 '+feel+'° · ':'')+hum+'%</div>'
        +'</div>'
      +'</div>'
      +'<div class="wbar-clock">'
        +'<div class="wbar-time" id="wbar-time">--:--</div>'
        +'<div class="wbar-date" id="wbar-date"></div>'
      +'</div>'
    +'</div>'
    +'<div class="wbar-sub">'+subItems+'</div>'
    +'<div style="margin-top:8px">'
      +'<div class="wbar-loc" id="wbar-loc" style="font-size:11px;opacity:.6"></div>'
    +'</div>';
  startClock();
}

function wIcon(c){
  if(c===0)return'☀️';if(c<=2)return'⛅';if(c<=3)return'☁️';
  if(c<=48)return'🌫️';if(c<=67)return'🌧️';if(c<=77)return'❄️';
  if(c<=82)return'🌧️';return'⛈️';
}
function pmGrade(v,t){
  if(t==='pm10'){
    if(v<=30)return{i:'😊',l:'좋음'};if(v<=80)return{i:'😐',l:'보통'};
    if(v<=150)return{i:'😷',l:'나쁨'};return{i:'🤢',l:'매우나쁨'};
  }else{
    if(v<=15)return{i:'😊',l:'좋음'};if(v<=35)return{i:'😐',l:'보통'};
    if(v<=75)return{i:'😷',l:'나쁨'};return{i:'🤢',l:'매우나쁨'};
  }
}
function uvGrade(v){
  if(v<=2)return'낮음';if(v<=5)return'보통';if(v<=7)return'높음';
  if(v<=10)return'매우높음';return'위험';
}

// ── 시계 ──────────────────────────────────────────────
var clockTimer=null;
function startClock(){
  if(clockTimer)clearInterval(clockTimer);
  function tick(){
    var now=new Date();
    var h=now.getHours(),m=now.getMinutes();
    var ampm=h<12?'AM':'PM';
    var h12=h%12||12;
    var days=['일','월','화','수','목','금','토'];
    var mo=now.getMonth()+1,d=now.getDate(),day=days[now.getDay()];
    var te=g('wbar-time'),de=g('wbar-date');
    if(te)te.innerHTML='<span style="font-size:11px;opacity:.7;margin-right:3px">'+ampm+'</span>'+String(h12).padStart(2,'0')+':'+String(m).padStart(2,'0');
    if(de)de.textContent=mo+'월 '+d+'일 ('+day+')';
  }
  tick();
  clockTimer=setInterval(tick,1000);
}

function loadLocation(lat,lon){
  fetch('https://dapi.kakao.com/v2/local/geo/coord2regioncode.json?x='+lon+'&y='+lat,{
    headers:{'Authorization':'KakaoAK '+KAKAO_REST}
  })
  .then(function(r){return r.json()})
  .then(function(d){
    var doc=d.documents&&d.documents[0];
    if(doc){
      var city=doc.region_1depth_name;
      var gu=doc.region_2depth_name;
      city=city.replace('특별시','').replace('광역시','').replace('특별자치시','').replace('특별자치도','');
      var locTxt='📍 '+city+' '+gu;
      // wbar-loc이 아직 없을 수 있으므로 최대 10회 재시도
      var tries=0;
      function trySet(){
        var el=g('wbar-loc');
        if(el){el.textContent=locTxt;}
        else if(tries++<10){setTimeout(trySet,300);}
      }
      trySet();
    }
  }).catch(function(){});
}

          return'<button type="button" class="day-btn'+(on?' on':'')+'" data-day="'+i+'" onclick="toggleDay(this)">'+day+'</button>';
        }).join('')
        +'</div></div>'};
  },
  cafes:function(d){
    var alld=d&&d.allday;
    return{title:d?'카페 수정':'카페 추가',
      html:'<div class="fg"><label>카페 이름 *</label><input type="text" id="f-name" value="'+esc(d?d.name||'':'')+'" placeholder="카페 이름"></div>'
        +'<div class="fg"><label>분위기</label><select id="f-cat"><option value="">선택 안 함</option>'
        +['감성카페','대형카페','디저트','루프탑','베이커리'].map(function(c){return'<option'+(d&&d.category===c?' selected':'')+'>'+c+'</option>'}).join('')
        +'</select></div>'
        +'<div class="fg"><label>주소</label><input type="text" id="f-addr" value="'+esc(d?d.address||'':'')+'" placeholder="주소 입력"></div>'
        +'<div class="fg" style="margin-bottom:4px"><label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap;cursor:pointer"><input type="checkbox" id="f-allday" onchange="toggleAllday()" style="width:15px;height:15px;accent-color:var(--rose);flex-shrink:0" '+(alld?'checked':'')+'>24시간 영업</label></div>'
        +'<div id="f-time-wrap" style="'+(alld?'display:none':'')+'">'
          +'<div class="fg" style="display:flex;gap:8px">'
            +'<div style="flex:1"><label>오픈</label><input type="time" id="f-open" value="'+(d?d.open_time||'':'')+'"></div>'
            +'<div style="flex:1"><label>마감</label><input type="time" id="f-close" value="'+(d?d.close_time||'':'')+'"></div>'
          +'</div>'
          +'<div class="fg" style="display:flex;gap:8px">'
            +'<div style="flex:1"><label>라스트오더</label><input type="time" id="f-lo" value="'+(d?d.last_order||'':'')+'"></div>'
            +'<div style="flex:1"><label>&nbsp;</label></div>'
          +'</div>'
          +'<div class="fg" style="display:flex;gap:8px">'
            +'<div style="flex:1"><label>브레이크 시작</label><input type="time" id="f-bts" value="'+(d?d.break_start||'':'')+'"></div>'
            +'<div style="flex:1"><label>브레이크 종료</label><input type="time" id="f-bte" value="'+(d?d.break_end||'':'')+'"></div>'
          +'</div>'
        +'</div>'
        +'<div class="fg"><label>메모</label><input type="text" id="f-memo" value="'+esc(d?d.memo||'':'')+'" placeholder="포토존 있음 등"></div>'
        +'<div class="fg"><label>정기 휴무일</label><div class="days-wrap" id="f-days-wrap">'
        +['일','월','화','수','목','금','토'].map(function(day,i){
          var on=d&&d.closed_days&&d.closed_days.indexOf(i)>=0;
          return'<button type="button" class="day-btn'+(on?' on':'')+'" data-day="'+i+'" onclick="toggleDay(this)">'+day+'</button>';
        }).join('')
        +'</div></div>'};
  },
  plans:function(d){
    return{title:d?'일정 수정':'데이트 일정 추가',
      html:'<div class="fg"><label>날짜</label><input type="date" id="f-date" value="'+(d?d.date||'':'')+'"></div>'
        +'<div class="fg"><label>제목 *</label><input type="text" id="f-name" value="'+esc(d?d.name||'':'')+'" placeholder="예: 성수 데이트"></div>'
        +'<div class="fg"><label>유형</label><select id="f-cat"><option value="">선택 안 함</option>'
        +['당일치기','1박2일','기념일','일상데이트'].map(function(c){return'<option'+(d&&d.category===c?' selected':'')+'>'+c+'</option>'}).join('')
        +'</select></div>'
        +'<div class="fg"><label>메모</label><textarea id="f-memo" placeholder="특별한 계획을 적어보세요">'+(d?esc(d.memo||''):'')+'</textarea></div>'};
  }
};

function toggleDay(btn){btn.classList.toggle('on')}

function toggleAllday(){
  var chk=g('f-allday'),wrap=g('f-time-wrap');
  if(chk&&wrap)wrap.style.display=chk.checked?'none':'';
}

function openAdd(cat){M_TYPE=cat;M_KEY=null;var f=FORMS[cat](null);g('m-ttl').textContent=f.title;g('m-body').innerHTML=f.html;g('mbg').classList.add('on');toggleAllday();}
function openEdit(key,cat){
  M_TYPE=cat;M_KEY=key;
  var item=DB[cat]&&DB[cat][key];
  if(!item){toast('항목을 찾을 수 없어요');return}
  var f=FORMS[cat](item);g('m-ttl').textContent=f.title;g('m-body').innerHTML=f.html;g('mbg').classList.add('on');
  // allday 체크박스 상태를 innerHTML 세팅 후 강제 적용
  var alldayEl=g('f-allday');
  if(alldayEl){alldayEl.checked=!!item.allday;toggleAllday();}
}
function closeModal(){g('mbg').classList.remove('on')}
function bgClick(e){if(e.target===g('mbg'))closeModal()}

async function saveModal(){
  var ne=g('f-name');
  if(!ne||!ne.value.trim()){if(ne)ne.style.borderColor='#e24b4a';return}
  var exist=(M_KEY&&DB[M_TYPE]&&DB[M_TYPE][M_KEY])||{};
  var alldayEl=g('f-allday');
  var daysWrap=g('f-days-wrap');
  var closedDays=daysWrap?Array.from(daysWrap.querySelectorAll('.day-btn.on')).map(function(b){return parseInt(b.dataset.day)}).sort():exist.closed_days||[];
  var item={
    name:ne.value.trim(),
    category:(g('f-cat')||{}).value||'',
    memo:(g('f-memo')||{}).value||'',
    address:(g('f-addr')||{}).value||'',
    steps:g('f-steps')?g('f-steps').value.split('\n').map(function(s){return s.trim()}).filter(Boolean):[],
    date:(g('f-date')||{}).value||'',
    allday:alldayEl?alldayEl.checked:false,
    open_time:(g('f-open')||{}).value||'',
    close_time:(g('f-close')||{}).value||'',
    last_order:(g('f-lo')||{}).value||'',
    break_start:(g('f-bts')||{}).value||'',
    break_end:(g('f-bte')||{}).value||'',
    closed_days:closedDays,
    visited:exist.visited||false,
    fav:exist.fav||false,
    ts:Date.now()
  };
  var k=M_KEY||uid(),wasEdit=!!M_KEY;
  try{
    await fb().set(rr(M_TYPE+'/'+k),item);
    closeModal();toast(wasEdit?'수정했어요 ♡':'추가했어요 ♡');
  }catch(err){toast('저장 실패: '+err.message)}
}

// ── 드래그 순서 변경 ──────────────────────────────────
var dragKey=null,dragCat=null,touchEl=null,touchClone=null,touchStartY=0;

function dragStart(e){
  dragKey=e.currentTarget.dataset.key;
  dragCat=e.currentTarget.dataset.cat;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.card.drag-over').forEach(function(el){el.classList.remove('drag-over')});
  e.currentTarget.classList.add('drag-over');
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.card.drag-over').forEach(function(el){el.classList.remove('drag-over')});
}
async function doDrop(e){
  e.preventDefault();
  var targetKey=e.currentTarget.dataset.key;
  var cat=e.currentTarget.dataset.cat;
  if(!dragKey||dragKey===targetKey||dragCat!==cat)return;
  e.currentTarget.classList.remove('drag-over');
  // 화면(DOM) 순서로 keys 배열 구성 - DB 객체 순서 아님!
  var container=g('lst-'+cat);
  var domCards=container?Array.from(container.querySelectorAll('.card[data-cat="'+cat+'"]')):[];
  var keys=domCards.map(function(el){return el.dataset.key});
  var fromIdx=keys.indexOf(dragKey),toIdx=keys.indexOf(targetKey);
  if(fromIdx<0||toIdx<0)return;
  keys.splice(fromIdx,1);keys.splice(toIdx,0,dragKey);
  var updates={};
  keys.forEach(function(k,i){updates[cat+'/'+k+'/order']=i});
  await fb().update(rr(''),updates);
  dragKey=null;dragCat=null;
}

// 터치 드래그
function touchStart(e){
  var handle=e.target.closest('.drag-handle');
  if(!handle)return;
  touchEl=e.currentTarget;
  touchStartY=e.touches[0].clientY;
  touchEl.classList.add('dragging');
}
function touchMove(e){
  if(!touchEl)return;
  e.preventDefault();
  var y=e.touches[0].clientY;
  var els=document.elementsFromPoint(e.touches[0].clientX,y);
  var target=els.find(function(el){return el.classList&&el.classList.contains('card')&&el!==touchEl});
  document.querySelectorAll('.card.drag-over').forEach(function(el){el.classList.remove('drag-over')});
  if(target)target.classList.add('drag-over');
}
async function touchEnd(e){
  if(!touchEl)return;
  var over=document.querySelector('.card.drag-over');
  if(over&&over!==touchEl){
    var cat=touchEl.dataset.cat;
    var fromKey=touchEl.dataset.key,toKey=over.dataset.key;
    // DOM 순서 기반으로 keys 구성
    var container=g('lst-'+cat);
    var domCards=container?Array.from(container.querySelectorAll('.card[data-cat="'+cat+'"]')):[];
    var keys=domCards.map(function(el){return el.dataset.key});
    var fi=keys.indexOf(fromKey),ti=keys.indexOf(toKey);
    if(fi>=0&&ti>=0){
      keys.splice(fi,1);keys.splice(ti,0,fromKey);
      var updates={};
      keys.forEach(function(k,i){updates[cat+'/'+k+'/order']=i});
      await fb().update(rr(''),updates);
    }
  }
  touchEl.classList.remove('dragging');
  document.querySelectorAll('.card.drag-over').forEach(function(el){el.classList.remove('drag-over')});
  touchEl=null;
}

// ── 페이지 전환 ───────────────────────────────────────
function goPage(page,btn){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on')});
  g('pg-'+page).classList.add('on');btn.classList.add('on');
}

// ── 초기화 ────────────────────────────────────────────
window.addEventListener('fb-ready',function(){
  var saved=localStorage.getItem('RK');
  if(saved){RK=saved;enterApp();}
});
